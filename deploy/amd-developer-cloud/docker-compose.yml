# ──────────────────────────────────────────────────────────────────────────────
# SMC Pulse Predict — AMD Developer Cloud Deployment (MI300X)
# ──────────────────────────────────────────────────────────────────────────────
# Co-locates the vLLM inference server (ROCm/MI300X) with the SMC API server.
#
# Quick start (see README.md for full guide):
#   1. ./setup.sh                               # one-time VM provisioning
#   2. cp .env.amd .env                         # review & edit MODEL if desired
#   3. docker compose up -d                     # start the stack
#   4. curl http://<vm-ip>:3001/api/healthz     # verify API server
#   5. curl http://<vm-ip>:8000/v1/models       # verify vLLM
# ──────────────────────────────────────────────────────────────────────────────

version: "3.9"

# ── Canonical defaults ───────────────────────────────────────────────────────
# .env.amd is the single source of truth for all configurable values.  Docker
# Compose reads .env at startup, so the workflow is:
#     cp .env.amd .env   →   edit .env   →   docker compose up -d
#
# The ${VAR:-fallback} expressions below are last-resort safety nets that only
# activate when no .env file is present.  When changing the default model or
# parser, update .env.amd first; the fallbacks here mirror it but must be kept
# in sync manually (Compose cannot YAML-merge into string values or env-var
# defaults, so there's no way to define these defaults once and reference them).
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── vLLM Inference Server (ROCm on MI300X) ──────────────────────────────────
  vllm:
    image: vllm/vllm-openai-rocm:latest
    restart: unless-stopped
    ports:
      - "${VLLM_PORT:-8000}:8000"
    environment:
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION:-9.4.2}
      - VLLM_USE_TRITON_FLASH_ATTN=0
    devices:
      - /dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - video
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp=unconfined
    ipc: host
    volumes:
      - vllm-cache:/root/.cache/vllm
      - hf-cache:/root/.cache/huggingface
    # --trust-remote-code (below) executes arbitrary Python from the HuggingFace
    # model repo at load time — a supply-chain risk.  Currently required for
    # Gemma 4 on ROCm because the model ships custom modeling code.  Remove it
    # if you switch to a model that does not bundle custom code.
    command: >
      --model ${LLM_MODEL:-google/gemma-4-26B-A4B-it}
      --host 0.0.0.0
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_MEM_UTIL:-0.92}
      --tensor-parallel-size ${VLLM_TP_SIZE:-1}
      --dtype ${VLLM_DTYPE:-auto}
      --tool-call-parser ${LLM_TOOL_PARSER:-gemma4}
      --reasoning-parser ${LLM_TOOL_PARSER:-gemma4}
      --enable-auto-tool-choice
      --trust-remote-code
      --enforce-eager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    # No `deploy.resources.reservations.devices driver: rocm` block here —
    # that reservation mechanism requires a registered Docker device driver
    # plugin (the way nvidia-container-toolkit registers "nvidia"). AMD ROCm
    # does not register one, so `driver: rocm` fails with "could not select
    # device driver". The plain `devices: /dev/kfd, /dev/dri` passthrough
    # above is the correct and sufficient way to expose the GPU to this
    # container — it's what AMD's own official ROCm container recipes use.

  # ── SMC API Server ──────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
      - "${MCP_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT:-3001}
      - MCP_PORT=${MCP_PORT:-3002}
      # LLM_PROVIDER is an env var (not a bare literal) so you can override it
      # via .env to test against fireworks/openai while still running on the
      # AMD VM — e.g. LLM_PROVIDER=fireworks.  The vllm container will still
      # start (depends_on is unconditional), but the API server will route to
      # the provider you choose.
      - LLM_PROVIDER=${LLM_PROVIDER:-amd}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
      - LLM_API_KEY=not-needed
      # Default model must stay in sync with .env.amd and provider.ts.
      - LLM_MODEL=${LLM_MODEL:-google/gemma-4-26B-A4B-it}
      - DATABASE_URL=${DATABASE_URL:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-}
      - FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
    # depends_on is unconditional — vLLM will always start even if you set
    # LLM_PROVIDER to a non-amd provider.  This is harmless; vLLM just idles
    # on the GPU if nothing queries it.  If you need to avoid GPU allocation
    # entirely (e.g. for a Fireworks-only test), comment out the vllm service
    # and this depends_on block.
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vllm-cache:
  hf-cache:
