# ── SMC Liquidity Hunter — Frontend nginx config ──────────────────────────────
# Serves the Vite-built SPA and proxies /api requests to the API container.

server {
    listen       80;
    server_name  _;

    # Security: don't advertise nginx version
    server_tokens off;

    # Gzip compression for static assets
    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    root   /usr/share/nginx/html;
    index  index.html;

    # ── API proxy ────────────────────────────────────────────────────────────
    # All /api requests are forwarded to the API server container.
    # The "api" hostname is the Docker Compose service name.
    location /api {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;

        # SSE / streaming support
        proxy_set_header   Connection         "";
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    # For client-side routing: if the requested file doesn't exist, serve
    # index.html so the React router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache headers for hashed assets ──────────────────────────────────────
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
