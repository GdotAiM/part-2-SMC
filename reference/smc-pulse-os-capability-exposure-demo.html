  theme: {
    extend: {
      colors: { ink:'#07080d', panel:'#0d1018', violet:'#8b5cf6', cyanx:'#22d3ee', mint:'#34d399' },
      boxShadow: { glow:'0 0 40px rgba(139,92,246,.16)' }

<style>
*{scrollbar-width:thin;scrollbar-color:#27233b #08090e}
body{background:#07080d;color:#f4f4f5}
.noise{background-image:radial-gradient(rgba(255,255,255,.035) 1px,transparent 1px);background-size:5px 5px}
.glass{background:linear-gradient(145deg,rgba(18,20,31,.88),rgba(10,11,17,.86));border:1px solid rgba(255,255,255,.07);backdrop-filter:blur(18px)}
.glass:hover{border-color:rgba(139,92,246,.32)}
.grid-bg{background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);background-size:42px 42px}
.pulse{animation:pulse 2.4s ease-in-out infinite}@keyframes pulse{50%{opacity:.45}}
.fade{animation:fade .25s ease-out}@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.scan{position:relative;overflow:hidden}.scan:after{content:"";position:absolute;left:0;right:0;top:-30%;height:30%;background:linear-gradient(transparent,rgba(139,92,246,.11),transparent);animation:scan 4s linear infinite;pointer-events:none}@keyframes scan{to{top:110%}}
.chart-line{fill:none;stroke:#a78bfa;stroke-width:2.4;filter:drop-shadow(0 0 6px rgba(167,139,250,.7))}
.tiny{font-size:10px;letter-spacing:.12em}.btn{transition:all .18s ease}.btn:hover{transform:translateY(-1px)}
.modal-backdrop{background:rgba(0,0,0,.72);backdrop-filter:blur(8px)}
</style>
</head>
<body class="min-h-screen noise">
<div id="app" class="min-h-screen"></div>
<script>
const state={view:'overview',asset:'BTCUSDT',timeframe:'1H',commandOpen:false,capabilityOpen:false,agentOpen:false,strategy:null,status:null,evalRunning:false,evalScore:66.6,chat:[{role:'agent',text:'Pulse online. I can inspect market structure, evaluate SMC models, run SMC-EVAL, or trace the evidence behind a signal.'}]};
const assets={BTCUSDT:{price:'104,284.20',change:'+2.84%',bias:'BULLISH',score:82,key:'104,910',entry:'103,740',invalid:'102,980'},NAS100:{price:'22,814.50',change:'+1.62%',bias:'BULLISH',score:78,key:'22,960',entry:'22,640',invalid:'22,410'},XAUUSD:{price:'3,347.80',change:'-0.38%',bias:'BEARISH',score:71,key:'3,318.40',entry:'3,361.20',invalid:'3,382.00'},EURUSD:{price:'1.17182',change:'+0.21%',bias:'BULLISH',score:69,key:'1.17440',entry:'1.17020',invalid:'1.16780'}};
const strategies=[
{name:'Silver Bullet',layer:'TEMPORAL',confidence:94,status:'PRIMARY',prereq:'Session window + liquidity sweep + MSS + FVG',events:'Liquidity Sweep → MSS → Displacement → FVG',invalid:'FVG invalidated / sweep extreme reclaimed'},
{name:'SMC Confluence 1',layer:'EXECUTABLE',confidence:87,status:'ALTERNATIVE',prereq:'HTF POI + BOS/MSS + FVG',events:'HTF POI → Liquidity → MSS → FVG',invalid:'Structure fails beyond sweep extreme'},
{name:'Liquidity Raid',layer:'STRUCTURAL',confidence:81,status:'DETECTED',prereq:'External liquidity + raid event',events:'External Liquidity → Sweep → Displacement',invalid:'No displacement after raid'},
{name:'FVG Model',layer:'CONCEPT',confidence:76,status:'CONFLUENCE',prereq:'Displacement + imbalance',events:'Displacement → FVG → Retrace',invalid:'FVG fully mitigated'},
{name:'Inducement Model',layer:'STRUCTURAL',confidence:64,status:'PARTIAL',prereq:'Internal liquidity + inducement raid',events:'MSS → IDM → IDM Raid',invalid:'Internal liquidity remains intact'}
];
function icon(name,cls='w-4 h-4'){const p={grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',activity:'<polyline points="3 12 7 12 10 4 14 19 17 12 21 12"/>',brain:'<path d="M9.5 3a3.5 3.5 0 0 0-3.4 4.4A3.5 3.5 0 0 0 7 14.1a3.5 3.5 0 0 0 6 3.3 3.5 3.5 0 0 0 6-3.3 3.5 3.5 0 0 0 .9-6.7A3.5 3.5 0 0 0 16.5 3a3.5 3.5 0 0 0-3.5 2A3.5 3.5 0 0 0 9.5 3Z"/><path d="M12 5v14M8 8h2M14 8h2M8 15h2M14 15h2"/>',zap:'<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',target:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/>',layers:'<polygon points="12 2 22 7 12 12 2 7 12 2"/><polyline points="2 12 12 17 22 12"/><polyline points="2 17 12 22 22 17"/>',book:'<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/>',flask:'<path d="M9 3h6M10 3v6l-5.5 9.5A2 2 0 0 0 6.2 21h11.6a2 2 0 0 0 1.7-2.5L14 9V3"/><path d="M8 15h8"/>',bot:'<rect x="4" y="7" width="16" height="13" rx="3"/><path d="M12 3v4M8 13h.01M16 13h.01M8 17h8"/>',chevron:'<polyline points="9 18 15 12 9 6"/>',search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-4-4"/>',close:'<path d="M6 6l12 12M18 6 6 18"/>',send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',terminal:'<polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>'};return `<svg class="${cls}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${p[name]||''}</svg>`}
function render(){const a=assets[state.asset];document.getElementById('app').innerHTML=`<div class="flex min-h-screen">${sidebar()}<main class="flex-1 min-w-0">${topbar()}<div class="p-5 lg:p-7 max-w-[1800px] mx-auto"><div id="view" class="fade">${view()}</div></div></main></div>${state.commandOpen?commandPalette():''}${state.capabilityOpen?capabilityExplorer():''}${state.agentOpen?agentDrawer():''}${state.strategy!==null?strategyDrawer():''}${state.status?statusModal():''}`;bind()}
function sidebar(){const nav=[['overview','grid','Overview'],['market','activity','Market'],['analyze','brain','Analyze'],['trade','target','Trade'],['learn','book','Learn'],['evaluate','flask','Evaluate'],['agent','bot','Agent']];return `<aside class="w-[238px] shrink-0 border-r border-white/[.06] bg-[#08090e] hidden lg:flex flex-col p-4"><div class="px-3 pt-2 pb-8"><div class="flex items-center gap-3"><div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-fuchsia-500 flex items-center justify-center shadow-glow"><span class="font-black text-lg">P</span></div><div><div class="font-black tracking-tight">SMC PULSE</div><div class="tiny text-violet-300/70">INTELLIGENCE OS</div></div></div></div><div class="tiny text-zinc-600 px-3 mb-3">COMMAND</div><nav class="space-y-1">${nav.map(n=>`<button data-view="${n[0]}" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm ${state.view===n[0]?'bg-violet-500/12 text-violet-200 border border-violet-400/15':'text-zinc-500 hover:text-zinc-200 hover:bg-white/[.03]'}">${icon(n[1])}<span>${n[2]}</span>${state.view===n[0]?'<span class="ml-auto w-1.5 h-1.5 rounded-full bg-violet-400 shadow-[0_0_8px_#8b5cf6]"></span>':''}</button>`).join('')}</nav><div class="tiny text-zinc-600 px-3 mt-8 mb-3">QUICK ACTIONS</div><div class="space-y-1"><button data-action="agent" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-zinc-500 hover:text-zinc-200 hover:bg-white/[.03]">${icon('bot')}Ask Agent</button><button data-action="analysis" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-zinc-500 hover:text-zinc-200 hover:bg-white/[.03]">${icon('activity')}Run Analysis</button><button data-action="benchmark" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-zinc-500 hover:text-zinc-200 hover:bg-white/[.03]">${icon('flask')}SMC-EVAL</button></div><div class="mt-auto glass rounded-2xl p-3"><div class="flex items-center gap-2 mb-3"><span class="w-2 h-2 rounded-full bg-emerald-400 pulse"></span><span class="text-xs text-zinc-400">SYSTEM ONLINE</span></div><div class="text-[11px] text-zinc-600">CAPABILITY EXPOSURE</div><div class="mt-1 text-sm text-zinc-300">150+ capabilities</div><div class="mt-2 h-1 rounded-full bg-white/[.06]"><div class="h-full w-[68%] rounded-full bg-gradient-to-r from-violet-500 to-cyan-400"></div></div><div class="mt-2 text-[10px] text-zinc-600">68% surfaced to interface</div></div></aside>`}
function topbar(){return `<header class="h-[72px] border-b border-white/[.06] flex items-center justify-between px-5 lg:px-8"><div class="flex items-center gap-4"><div><div class="text-sm text-zinc-500">Saturday, July 18, 2026</div><div class="font-semibold">Good afternoon, Ntloso <span class="text-violet-300">✦</span></div></div><div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-400/8 border border-emerald-400/15 text-xs text-emerald-300"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span> MARKET OPEN</div></div><div class="flex items-center gap-3"><button data-command class="hidden sm:flex items-center gap-3 px-3 py-2 rounded-xl border border-white/[.08] bg-white/[.025] text-xs text-zinc-500 hover:text-zinc-200">${icon('search')}<span>Search capabilities</span><kbd class="ml-2 px-1.5 py-0.5 rounded bg-white/[.06] text-[10px]">⌘K</kbd></button><select id="assetSelect" class="bg-[#0d1018] border border-white/[.08] rounded-xl px-3 py-2 text-xs text-zinc-300 outline-none">${Object.keys(assets).map(x=>`<option ${state.asset===x?'selected':''}>${x}</option>`).join('')}</select><div class="hidden md:flex items-center gap-2 px-3 py-2 rounded-xl border border-cyan-400/15 bg-cyan-400/5 text-xs text-cyan-300">${icon('activity','w-3.5 h-3.5')} TradingView Connected</div><button data-action="agent" class="w-9 h-9 rounded-xl border border-violet-400/20 bg-violet-500/10 text-violet-200 flex items-center justify-center hover:bg-violet-500/20">${icon('bot')}</button></div></header>`}
function pageTitle(k,t,d){return `<div class="mb-6"><div class="tiny text-violet-300/70 mb-2">${k}</div><h1 class="text-3xl lg:text-4xl font-black tracking-tight">${t}</h1><p class="mt-2 text-sm text-zinc-500 max-w-2xl">${d}</p></div>`}
function view(){switch(state.view){case'market':return marketView();case'analyze':return analyzeView();case'trade':return tradeView();case'learn':return learnView();case'evaluate':return evaluateView();case'agent':return agentView();default:return overview()}}
function overview(){const a=assets[state.asset];return `${pageTitle('COMMAND CENTER','Market intelligence, exposed.','SMC Pulse OS is surfacing the capabilities that used to live behind the agent layer. Observe. Analyse. Evaluate. Learn.')}<div class="flex flex-wrap gap-2 mb-5"><button data-capabilities class="btn px-4 py-2.5 rounded-xl bg-violet-500/15 border border-violet-400/20 text-violet-200 text-sm flex items-center gap-2">${icon('layers')} Explore capabilities <span class="text-violet-400">↗</span></button><button data-action="analysis" class="btn px-4 py-2.5 rounded-xl bg-white/[.04] border border-white/[.08] text-zinc-300 text-sm">${icon('activity')} Run analysis</button><button data-action="benchmark" class="btn px-4 py-2.5 rounded-xl bg-white/[.04] border border-white/[.08] text-zinc-300 text-sm">${icon('flask')} Run SMC-EVAL</button></div><div class="grid grid-cols-12 gap-4"><section class="col-span-12 xl:col-span-8 glass rounded-2xl overflow-hidden scan grid-bg"><div class="p-5 flex items-center justify-between border-b border-white/[.05]"><div><div class="flex items-center gap-2"><span class="font-semibold">${state.asset}</span><span class="text-emerald-300 text-xs">${a.change}</span></div><div class="text-xs text-zinc-600 mt-1">MARKET INTELLIGENCE CANVAS · LIVE MOCK DATA</div></div><div class="flex gap-1">${['1D','4H','1H','15M','5M','1M'].map(t=>`<button data-timeframe="${t}" class="px-2.5 py-1.5 rounded-lg text-[11px] ${state.timeframe===t?'bg-violet-500/20 text-violet-200':'text-zinc-600 hover:text-zinc-300'}">${t}</button>`).join('')}</div></div><div class="relative h-[360px] p-4"><svg viewBox="0 0 900 360" class="w-full h-full"><defs><linearGradient id="area" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#8b5cf6" stop-opacity=".25"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient></defs><path fill="url(#area)" d="M0 280 L45 250 L80 265 L125 220 L165 235 L205 180 L245 205 L285 150 L330 175 L370 130 L410 145 L450 115 L490 155 L530 125 L570 95 L610 115 L650 70 L690 105 L730 82 L770 120 L810 75 L850 90 L900 50 L900 360 L0 360Z"/><path class="chart-line" d="M0 280 L45 250 L80 265 L125 220 L165 235 L205 180 L245 205 L285 150 L330 175 L370 130 L410 145 L450 115 L490 155 L530 125 L570 95 L610 115 L650 70 L690 105 L730 82 L770 120 L810 75 L850 90 L900 50"/><line x1="0" y1="190" x2="900" y2="190" stroke="#22d3ee" stroke-dasharray="5 5" opacity=".35"/><line x1="0" y1="110" x2="900" y2="110" stroke="#8b5cf6" stroke-dasharray="5 5" opacity=".35"/><rect x="360" y="126" width="120" height="35" fill="#8b5cf6" opacity=".12" stroke="#a78bfa" stroke-dasharray="3 3"/><rect x="560" y="78" width="95" height="32" fill="#22d3ee" opacity=".1" stroke="#22d3ee" stroke-dasharray="3 3"/><text x="22" y="180" fill="#22d3ee" font-size="11">LIQUIDITY POOL</text><text x="370" y="120" fill="#c4b5fd" font-size="11">FVG</text><text x="570" y="72" fill="#67e8f9" font-size="11">HTF POI</text><text x="715" y="73" fill="#34d399" font-size="11">BOS ↑</text><text x="505" y="122" fill="#fbbf24" font-size="11">MSS</text></svg><div class="absolute bottom-5 left-6 flex items-center gap-3 text-[10px] text-zinc-600"><span><i class="inline-block w-2 h-2 rounded-full bg-violet-400 mr-1"></i>SMC ENGINE</span><span><i class="inline-block w-2 h-2 rounded-full bg-cyan-400 mr-1"></i>TRADINGVIEW</span><span><i class="inline-block w-2 h-2 rounded-full bg-emerald-400 mr-1"></i>AGENT OBSERVATION</span></div></div></section><section class="col-span-12 xl:col-span-4 glass rounded-2xl p-5"><div class="flex items-center justify-between mb-5"><div><div class="font-semibold">Key intelligence</div><div class="text-xs text-zinc-600 mt-1">What the system sees</div></div><span class="px-2 py-1 rounded-lg bg-emerald-400/10 text-emerald-300 text-[10px]">CONFIDENCE ${a.score}%</span></div><div class="grid grid-cols-2 gap-2">${[['BIAS',a.bias,a.bias==='BULLISH'?'text-emerald-300':'text-rose-300'],['STRUCTURE','BOS CONFIRMED','text-violet-300'],['LIQUIDITY','SELL-SIDE RAID','text-cyan-300'],['KEY LEVEL',a.key,'text-zinc-200'],['OPTIMAL ENTRY',a.entry,'text-emerald-300'],['INVALIDATION',a.invalid,'text-rose-300']].map(x=>`<div class="rounded-xl bg-white/[.025] border border-white/[.05] p-3"><div class="tiny text-zinc-600">${x[0]}</div><div class="mt-2 text-sm font-semibold ${x[2]}">${x[1]}</div></div>`).join('')}</div><button data-action="agent" class="w-full mt-4 py-3 rounded-xl bg-violet-500/15 border border-violet-400/20 text-violet-200 text-sm hover:bg-violet-500/20">${icon('bot','w-4 h-4 inline mr-2')}Ask Pulse Agent to explain</button></section>${agentCard()}${systemCard()}${cascade()}${strategiesCard()}${signalCard()}${brokerCard()}${evalCard()}</div>`}
function agentCard(){return `<section class="col-span-12 lg:col-span-7 glass rounded-2xl p-5"><div class="flex justify-between items-start"><div><div class="flex items-center gap-2 font-semibold">${icon('bot','w-4 h-4 text-violet-300')} Agent Command Center <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse"></span></div><div class="text-xs text-zinc-600 mt-1">MCP ORCHESTRATION · REASONING LAYER</div></div><span class="text-[10px] px-2 py-1 rounded-lg bg-emerald-400/10 text-emerald-300">ACTIVE</span></div><div class="mt-5 p-4 rounded-xl bg-[#090b11] border border-white/[.05]"><div class="flex gap-3"><div class="w-7 h-7 rounded-lg bg-violet-500/15 flex items-center justify-center text-violet-300">${icon('brain','w-4 h-4')}</div><p class="text-sm leading-relaxed text-zinc-300">"BTCUSDT is showing a <span class="text-violet-300">bullish delivery sequence</span>. The sell-side raid created the liquidity event. 1H structure confirms BOS and the active FVG provides the cleanest execution location."</p></div></div><div class="grid grid-cols-3 gap-3 mt-4"><div><div class="tiny text-zinc-600">ACTIVE TOOLS</div><div class="mt-1 text-lg font-semibold">12<span class="text-zinc-600 text-sm"> / 104+</span></div></div><div><div class="tiny text-zinc-600">RESPONSE</div><div class="mt-1 text-lg font-semibold">42<span class="text-zinc-600 text-sm"> ms</span></div></div><div><div class="tiny text-zinc-600">TOKENS</div><div class="mt-1 text-lg font-semibold">3.8k</div></div></div><button data-action="agent" class="mt-5 w-full py-3 rounded-xl bg-white/[.04] border border-white/[.07] text-sm text-zinc-300 hover:bg-white/[.07]">Open intelligence interface ${icon('chevron','w-4 h-4 inline ml-1')}</button></section>`}
function systemCard(){return `<section class="col-span-12 lg:col-span-5 glass rounded-2xl p-5"><div class="flex justify-between"><div><div class="font-semibold">System status</div><div class="text-xs text-zinc-600 mt-1">INFRASTRUCTURE HEALTH</div></div><span class="text-emerald-300 text-xs">ALL SYSTEMS NOMINAL</span></div><div class="mt-5 space-y-2">${[['SMC ENGINE','99.9%','CORE'],['MCP SERVER','104 TOOLS','ORCHESTRATOR'],['TRADINGVIEW','CONNECTED','DATA'],['DATABASE','HEALTHY','PERSISTENCE'],['BROKER','REVIEW MODE','EXECUTION']].map(x=>`<button data-status="${x[0]}" class="w-full flex items-center justify-between p-3 rounded-xl bg-white/[.025] border border-white/[.04] hover:bg-white/[.05] text-left"><div class="flex items-center gap-3"><span class="w-2 h-2 rounded-full ${x[0]==='BROKER'?'bg-amber-400':'bg-emerald-400'}"></span><span class="text-sm text-zinc-300">${x[0]}</span></div><div class="text-right"><div class="text-xs text-zinc-300">${x[1]}</div><div class="tiny text-zinc-600">${x[2]}</div></div></button>`).join('')}</div></section>`}
function cascade(){const rows=[['D','BULLISH','HTF BIAS'],['4H','BULLISH','POI ACTIVE'],['1H','BULLISH','BOS CONFIRMED'],['15M','BULLISH','LIQUIDITY RAID'],['5M','BULLISH','FVG FORMED'],['1M','WAITING','EXECUTION']];return `<section class="col-span-12 lg:col-span-5 glass rounded-2xl p-5"><div class="flex justify-between"><div><div class="font-semibold">Multi-TF cascade</div><div class="text-xs text-zinc-600 mt-1">7-TIMEFRAME STRUCTURAL ALIGNMENT</div></div><span class="text-violet-300 text-sm font-semibold">82%</span></div><div class="mt-5 space-y-2">${rows.map((r,i)=>`<div class="flex items-center gap-3"><div class="w-8 text-xs font-semibold ${i===5?'text-amber-300':'text-zinc-400'}">${r[0]}</div><div class="flex-1 h-2 rounded-full bg-white/[.05] overflow-hidden"><div class="h-full rounded-full ${i===5?'bg-amber-400/70':'bg-gradient-to-r from-violet-500 to-cyan-400'}" style="width:${[100,96,92,88,82,58][i]}%"></div></div><div class="w-28 text-right"><div class="text-[11px] ${i===5?'text-amber-300':'text-emerald-300'}">${r[1]}</div><div class="tiny text-zinc-600">${r[2]}</div></div></div>`).join('')}</div></section>`}

function commandPalette(){const cmds=[['Analyse Market','activity','Inspect current market structure'],['Inspect TradingView','activity','Read chart intelligence'],['Run SMC-EVAL','flask','Evaluate AI reasoning'],['Browse Strategies','brain','Open Strategy Atlas'],['Ask Agent','bot','Talk to Pulse'],['View Learning','book','Inspect evidence and outcomes'],['Backtest Strategy','target','Run historical simulation']];return `<div class="fixed inset-0 z-50 modal-backdrop flex items-start justify-center pt-[14vh]" data-close-command><div class="w-[min(620px,calc(100vw-32px))] glass rounded-2xl shadow-glow overflow-hidden fade" onclick="event.stopPropagation()"><div class="p-4 border-b border-white/[.06] flex items-center gap-3">${icon('search','w-5 h-5 text-zinc-500')}<input id="cmdInput" autofocus class="bg-transparent outline-none flex-1 text-sm" placeholder="Search capabilities..."/><kbd class="text-[10px] text-zinc-600">ESC</kbd></div><div class="p-2">${cmds.map((c,i)=>`<button data-cmd="${i}" class="w-full text-left flex items-center gap-3 p-3 rounded-xl hover:bg-white/[.05]"><div class="w-8 h-8 rounded-lg bg-violet-500/10 text-violet-300 flex items-center justify-center">${icon(c[1])}</div><div><div class="text-sm text-zinc-300">${c[0]}</div><div class="text-xs text-zinc-600 mt-1">${c[2]}</div></div><span class="ml-auto text-zinc-700">${icon('chevron')}</span></button>`).join('')}</div></div></div>`}

function agentDrawer(){return `<div class="fixed inset-0 z-50 modal-backdrop" data-close-agent><div class="absolute right-0 top-0 bottom-0 w-[min(500px,100%)] glass border-l border-white/[.08] p-5 fade" onclick="event.stopPropagation()"><div class="flex justify-between items-center"><div><div class="font-semibold">Pulse Agent</div><div class="text-xs text-zinc-600 mt-1">INTELLIGENCE INTERFACE</div></div><button data-close-agent class="text-zinc-500 hover:text-white">${icon('close')}</button></div><div class="mt-8 p-4 rounded-2xl bg-violet-500/8 border border-violet-400/15"><div class="flex gap-3"><div class="text-violet-300">${icon('brain')}</div><div class="text-sm text-zinc-300 leading-relaxed">I can expose the system's capabilities through natural language. Ask me to inspect the current market, identify the dominant SMC model, or evaluate the reasoning.</div></div></div><div class="mt-6 grid grid-cols-2 gap-2">${['Analyse BTCUSDT','Explain Silver Bullet','Run SMC-EVAL','Show strategy atlas'].map(x=>`<button data-agent-suggest="${x}" class="p-3 rounded-xl bg-white/[.03] border border-white/[.06] text-xs text-zinc-400 hover:text-violet-200 text-left">${x}</button>`).join('')}</div><button data-view="agent" class="w-full mt-6 py-3 rounded-xl bg-violet-500/15 border border-violet-400/20 text-violet-200 text-sm">Open full agent interface</button></div></div>`}
function strategyDrawer(){const s=strategies[state.strategy];return `<div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4" data-close-strategy><div class="w-[min(650px,100%)] glass rounded-2xl p-6 fade" onclick="event.stopPropagation()"><div class="flex justify-between"><div><div class="tiny text-violet-300/70">${s.layer} · MODEL INTELLIGENCE</div><h2 class="mt-2 text-2xl font-black">${s.name}</h2></div><button data-close-strategy class="text-zinc-500">${icon('close')}</button></div><div class="mt-6 grid grid-cols-2 gap-3"><div class="p-4 rounded-xl bg-white/[.025]"><div class="tiny text-zinc-600">CONFIDENCE</div><div class="mt-2 text-2xl font-black text-violet-300">${s.confidence}%</div></div><div class="p-4 rounded-xl bg-white/[.025]"><div class="tiny text-zinc-600">CLASSIFICATION</div><div class="mt-2 text-lg font-bold text-emerald-300">${s.status}</div></div></div><div class="mt-5 space-y-3"><div class="p-4 rounded-xl bg-white/[.025]"><div class="tiny text-zinc-600">PREREQUISITES</div><div class="mt-2 text-sm text-zinc-300">${s.prereq}</div></div><div class="p-4 rounded-xl bg-white/[.025]"><div class="tiny text-zinc-600">DETECTED EVENT SEQUENCE</div><div class="mt-2 text-sm text-violet-200">${s.events}</div></div><div class="p-4 rounded-xl bg-rose-400/5 border border-rose-400/10"><div class="tiny text-rose-300/60">INVALIDATION</div><div class="mt-2 text-sm text-rose-200">${s.invalid}</div></div></div></div></div>`}
function statusModal(){return `<div class="fixed inset-0 z-50 modal-backdrop flex items-center justify-center p-4" data-close-status><div class="w-[min(500px,100%)] glass rounded-2xl p-6 fade" onclick="event.stopPropagation()"><div class="flex justify-between"><div><div class="tiny text-cyan-300/70">SYSTEM TELEMETRY</div><h2 class="mt-2 text-2xl font-black">${state.status}</h2></div><button data-close-status class="text-zinc-500">${icon('close')}</button></div><div class="mt-6 p-5 rounded-2xl bg-emerald-400/5 border border-emerald-400/15"><div class="flex items-center gap-3"><span class="w-3 h-3 rounded-full bg-emerald-400 pulse"></span><span class="text-emerald-300 font-semibold">HEALTHY</span></div><p class="mt-3 text-sm text-zinc-500">All mock telemetry signals are within nominal operating parameters. The capability layer is available.</p></div><div class="mt-5 grid grid-cols-2 gap-3">${[['LATENCY','42ms'],['UPTIME','99.9%'],['ACTIVE','12'],['QUEUE','0']].map(x=>`<div class="p-4 rounded-xl bg-white/[.025]"><div class="tiny text-zinc-600">${x[0]}</div><div class="mt-2 text-xl font-bold">${x[1]}</div></div>`).join('')}</div></div></div>`}
function bind(){document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{state.view=b.dataset.view;state.agentOpen=false;render()});document.querySelectorAll('[data-action]').forEach(b=>b.onclick=()=>{const a=b.dataset.action;if(a==='agent')state.agentOpen=true;if(a==='analysis')state.view='analyze';if(a==='benchmark')state.view='evaluate';render()});document.querySelectorAll('[data-capabilities]').forEach(b=>b.onclick=()=>{state.capabilityOpen=true;render()});document.querySelectorAll('[data-command]').forEach(b=>b.onclick=()=>{state.commandOpen=true;render()});document.querySelectorAll('[data-timeframe]').forEach(b=>b.onclick=()=>{state.timeframe=b.dataset.timeframe;render()});document.querySelectorAll('[data-strategy]').forEach(b=>b.onclick=()=>{state.strategy=+b.dataset.strategy;render()});document.querySelectorAll('[data-status]').forEach(b=>b.onclick=()=>{state.status=b.dataset.status;render()});document.querySelectorAll('[data-close-command]').forEach(b=>b.onclick=()=>{state.commandOpen=false;render()});document.querySelectorAll('[data-close-cap]').forEach(b=>b.onclick=()=>{state.capabilityOpen=false;render()});document.querySelectorAll('[data-close-agent]').forEach(b=>b.onclick=()=>{state.agentOpen=false;render()});document.querySelectorAll('[data-close-strategy]').forEach(b=>b.onclick=()=>{state.strategy=null;render()});document.querySelectorAll('[data-close-status]').forEach(b=>b.onclick=()=>{state.status=null;render()});const sel=document.getElementById('assetSelect');if(sel)sel.onchange=()=>{state.asset=sel.value;render()};document.querySelectorAll('[data-asset]').forEach(b=>b.onclick=()=>{state.asset=b.dataset.asset;render()});document.querySelectorAll('[data-cmd]').forEach(b=>b.onclick=()=>{const i=+b.dataset.cmd;const map=['analyze','market','evaluate','analyze','agent','learn','trade'];state.view=map[i];state.commandOpen=false;state.agentOpen=i===4;render()});const run=document.querySelector('[data-run-eval]');if(run)run.onclick=()=>{if(state.evalRunning)return;state.evalRunning=true;render();setTimeout(()=>{state.evalRunning=false;state.evalScore=68.2;render()},1800)};const send=document.querySelector('[data-send-chat]');if(send)send.onclick=sendChat;const input=document.getElementById('agentInput');if(input)input.onkeydown=e=>{if(e.key==='Enter')sendChat()};document.querySelectorAll('[data-agent-suggest]').forEach(b=>b.onclick=()=>{state.agentOpen=false;state.view='agent';state.chat.push({role:'user',text:b.dataset.agentSuggest});state.chat.push({role:'agent',text:agentReply(b.dataset.agentSuggest)});render()})}
function sendChat(){const i=document.getElementById('agentInput');if(!i||!i.value.trim())return;const text=i.value.trim();state.chat.push({role:'user',text});i.value='';state.chat.push({role:'agent',text:agentReply(text)});render()}
function agentReply(text){const t=text.toLowerCase();if(t.includes('silver'))return'Silver Bullet is currently the PRIMARY candidate. The session context, liquidity event, MSS, and FVG sequence are aligned. I would classify the setup as high-confidence, but the invalidation remains the sweep extreme.';if(t.includes('eval')||t.includes('benchmark'))return'SMC-EVAL is currently at 66.6/100 DEVELOPING. Model alignment is strong at 23.4/25. The main weakness is causal reasoning depth — exactly the kind of weakness the benchmark is designed to expose.';if(t.includes('liquid'))return'The system detected a sell-side liquidity raid followed by displacement. That event is currently carrying the strongest explanatory weight in the model ranking.';if(t.includes('strategy')||t.includes('model'))return'I see 5 high-relevance model candidates. Silver Bullet is PRIMARY at 94%, followed by SMC Confluence 1 at 87%. Tap Strategy Atlas if you want to inspect the full 59-model taxonomy.';return'I would inspect the 7-timeframe cascade first, then rank the detected SMC models against their prerequisites. The important question is not "what concepts are present?" but "what model best explains the sequence of events?"'}
document.addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();state.commandOpen=true;render()}if(e.key==='Escape'){state.commandOpen=false;state.capabilityOpen=false;state.agentOpen=false;state.strategy=null;state.status=null;render()}});
render();
</script>
</body>
</html>
